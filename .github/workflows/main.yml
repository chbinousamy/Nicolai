name: Build, Test, and Archive Xcode Project for iPhone

on:
  push:
    branches: [ main ] # Remplace par ta branche principale si nécessaire

jobs:
  build_test_archive:
    runs-on: macos-latest
    steps:
      - name: List available Xcode versions
        run: ls /Applications | grep Xcode
        
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files in the project directory
        run: ls -la

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
        
      - name: List Schemes
        run: xcodebuild -project Nikolai.xcodeproj -list

      - name: Build for iPhone
        run: |
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -destination 'generic/platform=iOS Simulator' \
            clean build \
            CODE_SIGNING_ALLOWED=NO

#      - name: Run Unit Tests
#        run: |
#          xcodebuild \
#            -project Nikolai.xcodeproj \
#            -scheme Nikolai \
#            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
#            test \
#            CODE_SIGNING_ALLOWED=NO

#      - name: Run UI Tests
#        run: |
#          xcodebuild \
#            -project Nikolai.xcodeproj \
#            -scheme Nikolai \
#            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
#            test \
#            CODE_SIGNING_ALLOWED=NO

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > \
          ~/Library/MobileDevice/Provisioning\ Profiles/Nikolai.mobileprovision

      - name: Install certificate
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificat.p12

          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import certificat.p12 \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
            -k build.keychain \
            -T /usr/bin/codesign

          security list-keychains -s build.keychain login.keychain

          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain

      - name: Archive
        run: |
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -configuration Release \
            -archivePath $PWD/build/Nikolai.xcarchive \
            -destination 'generic/platform=iOS' \
            archive

      - name: Debug profils et certificats
        run: |
          echo "=== Profils installés ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "--- Fichier: $f ---"
            security cms -D -i "$f" | plutil -extract Name raw -
            security cms -D -i "$f" | plutil -extract UUID raw -
          done

          echo "=== Certificats disponibles ==="
          security find-identity -v -p codesigning build.keychain

          echo "=== Contenu xcarchive ==="
          cat $PWD/build/Nikolai.xcarchive/Info.plist
    
      - name: Export .ipa
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Nikolai.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nikolai.ipa
          path: build/Nikolai.ipa
