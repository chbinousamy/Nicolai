name: Build, Test, and Archive Xcode Project for iPhone

on:
  push:
    branches: [ main ] # Remplace par ta branche principale si nécessaire

jobs:
  build_test_archive:
    runs-on: macos-latest
    steps:
      - name: List available Xcode versions
        run: ls /Applications | grep Xcode
        
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files in the project directory
        run: ls -la

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode.app
        
      - name: List Schemes
        run: xcodebuild -project Nikolai.xcodeproj -list

      - name: Build for iPhone
        run: |
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -destination 'generic/platform=iOS Simulator' \
            clean build

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test

      - name: Run UI Tests
        run: |
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            test
    

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Nikolai.mobileprovision

      - name: Install certificate
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificat.p12
          security create-keychain -p "" build.keychain
          security import certificat.p12 -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -k build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Archive and Export .ipa
        run: |
          # Archive le projet
          xcodebuild \
            -project Nikolai.xcodeproj \
            -scheme Nikolai \
            -configuration Release \
            -archivePath $PWD/build/Nikolai.xcarchive \
            -allowProvisioningUpdates \
            archive

          # Exporte l'.ipa
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Nikolai.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build \
            -allowProvisioningUpdates

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nikolai.ipa
          path: build/Nikolai.ipa
